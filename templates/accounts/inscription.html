{% extends 'base.html' %}
{% block title %}Inscription{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-title">🌸 Inscription</div>
        <p style="text-align:center; color:#aaa; font-size:0.85rem; margin-bottom:28px;">
            Créez votre compte ESMT Tasks
        </p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" name="first_name">
            </div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" name="last_name">
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select name="role">
                    <option value="etudiant">Étudiant</option>
                    <option value="professeur">Professeur</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password1" required>
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" name="password2" required>
            </div>
            {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; margin-top:8px;">
                S'inscrire
            </button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:#aaa;">
            Déjà un compte ? <a href="{% url 'connexion' %}" style="color:#c9547a;">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
