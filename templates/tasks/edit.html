{% extends 'base.html' %}
{% block title %}Modifier la tâche{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h3 class="mb-4"><i class="fas fa-edit me-2"></i>Modifier la tâche</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Titre</label>
                    <input type="text" name="titre" class="form-control" value="{{ tache.titre }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ tache.description }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Statut</label>
                    <select name="statut" class="form-select">
                        <option value="todo" {% if tache.statut == 'todo' %}selected{% endif %}>À faire</option>
                        <option value="en_cours" {% if tache.statut == 'en_cours' %}selected{% endif %}>En cours</option>
                        <option value="termine" {% if tache.statut == 'termine' %}selected{% endif %}>Terminé</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Date limite</label>
                    <input type="date" name="date_limite" class="form-control"
                           value="{{ tache.date_limite|date:'Y-m-d' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Assigner à</label>
                    <select name="assignee" class="form-select">
                        <option value="">— Non assigné —</option>
                        {% for membre in membres %}
                        <option value="{{ membre.pk }}" {% if tache.assignee == membre %}selected{% endif %}>
                            {{ membre.username }} ({{ membre.get_role_display }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>Sauvegarder
                    </button>
                    <div class="mb-3">
                    <label class="form-label fw-bold">Priorité</label>
                    <select name="priorite" class="form-select">
                        <option value="basse" {% if tache.priorite == 'basse' %}selected{% endif %}>🟢 Basse</option>
                        <option value="moyenne" {% if tache.priorite == 'moyenne' %}selected{% endif %}>🟡 Moyenne</option>
                        <option value="haute" {% if tache.priorite == 'haute' %}selected{% endif %}>🔴 Haute</option>
                    </select>
                </div>
                    <a href="{% url 'projet_detail' tache.projet.pk %}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
