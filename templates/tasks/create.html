{% extends 'base.html' %}
{% block title %}Nouvelle Tâche{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="mb-3">
    <label class="form-label fw-bold">Priorité</label>
    <select name="priorite" class="form-select">
        <option value="basse">🟢 Basse</option>
        <option value="moyenne" selected>🟡 Moyenne</option>
        <option value="haute">🔴 Haute</option>
    </select>
</div>
    <div class="col-md-7">
        <div class="card p-4">
            <h3 class="mb-4">
                <i class="fas fa-plus me-2"></i>Nouvelle tâche — {{ projet.titre }}
            </h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Titre</label>
                    <input type="text" name="titre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Date limite</label>
                    <input type="date" name="date_limite" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Assigner à</label>
                    <select name="assignee" class="form-select">
                        <option value="">— Non assigné —</option>
                        {% for membre in membres %}
                        <option value="{{ membre.pk }}">
                            {{ membre.username }} ({{ membre.get_role_display }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>Créer
                    </button>
                    <a href="{% url 'projet_detail' projet.pk %}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
